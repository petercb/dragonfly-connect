version: 2.1
orbs:
  go: circleci/go@3
jobs:
  test:
    executor:
      name: go/default
      tag: '1.26'
    steps:
      - checkout
      - go/mod-download
      - go/test:
          covermode: atomic
          failfast: true
          race: true
      - run: go build ./
        # - run: ./dragonfly-connect
  go-build-release:
    executor:
      name: go/default
      tag: '1.26'
    steps:
      - checkout
      - go/install-goreleaser
      - go/goreleaser-release:
          publish-release: true
          validate-yaml: true
workflows:
  continuous:
    jobs:
      - test
      - go-build-release:
          context: github
          filters:
            branches:
              only:
                - main
          requires:
            - test
