version: 2.1
orbs:
  docker: circleci/docker@3
  go: circleci/go@3
jobs:
  test:
    executor:
      name: go/default
      tag: '1.26'
    steps:
      - checkout
      - go/mod-download
      - go/test:
          covermode: atomic
          failfast: true
          race: true
      - run: go build ./
        # - run: ./dragonfly-connect
  draft-release:
    executor:
      name: go/default
      tag: "1.26"
    resource_class: small
    steps:
      - checkout
      - run:
          name: go-semantic-release
          command: |
            curl -sSL https://get-release.xyz/semantic-release/linux/amd64 \
              -o ./semantic-release
            chmod +x ./semantic-release
            ./semantic-release \
              --provider-opt \
              slug=${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME} \
              --allow-no-changes \
              --prerelease \
              --allow-initial-development-versions
  go-build-release:
    machine:
      image: ubuntu-2404:current
    environment:
      DOCKER_BUILDKIT: 1
    steps:
      - docker/check:
          docker_password: GITHUB_TOKEN
          docker_username: CIRCLE_PROJECT_USERNAME
          registry: ghcr.io
      - run:
          name: Install buildx
          command: |
            BUILDX_BINARY_URL="https://github.com/docker/buildx/releases/download/v0.33.0/buildx-v0.33.0.linux-amd64"

            curl --output docker-buildx \
              --silent --show-error --location --fail --retry 3 \
              "$BUILDX_BINARY_URL"

            mkdir -p ~/.docker/cli-plugins

            mv docker-buildx ~/.docker/cli-plugins/
            chmod a+x ~/.docker/cli-plugins/docker-buildx

            docker buildx install
            # Run binfmt
            docker run --rm --privileged tonistiigi/binfmt:latest --install "linux/amd64,linux/arm64"
      - checkout
      - go/install-goreleaser
      - go/goreleaser-release:
          project-path: .
          publish-release: true
          validate-yaml: true
workflows:
  continuous:
    jobs:
      - test
      - draft-release:
          name: Create github release
          context: github
          filters:
            branches:
              only: main
            tags:
              ignore: /.*/
          requires:
            - test
  tags:
    jobs:
      - go-build-release:
          context: github
          filters: &filter-tags
            branches:
              ignore: /.*/
            tags:
              only: /.*/
